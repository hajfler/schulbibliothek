version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schulbibliothek-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-schulbibliothek}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      CRON_SECRET: ${CRON_SECRET}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - schulbibliothek

  db:
    image: postgres:16-alpine
    container_name: schulbibliothek-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-schulbibliothek}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schulbibliothek

  # Reminder cron job - runs every hour
  cron:
    image: curlimages/curl:latest
    container_name: schulbibliothek-cron
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
        while true; do
          sleep 3600;
          curl -s -X POST http://app:3000/api/reminders/send \
            -H 'Authorization: Bearer ${CRON_SECRET}' \
            -H 'Content-Type: application/json' || true;
        done
      "
    depends_on:
      - app
    networks:
      - schulbibliothek

volumes:
  postgres_data:
    name: schulbibliothek_postgres_data

networks:
  schulbibliothek:
    name: schulbibliothek_network
